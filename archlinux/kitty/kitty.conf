include ~/.cache/wal/colors-kitty.conf

font_family family="SF Pro Mono"
font_size 14.0

shell_integration enabled
term xterm-kitty
map_timeout 1.2

tab_title_template "{index}:{session_name} {title}"
enabled_layouts splits,tall,fat,grid,stack,horizontal,vertical
tab_switch_strategy previous
tab_bar_style powerline
# Optional: if you keep multiple sessions inside one kitty OS window,
# show only tabs from the active session
# tab_bar_filter session:~ or session:^$

cursor_trail 1
cursor_trail_start_threshold 1
cursor_trail_decay 0.01 0.20
cursor_beam_thickness 2.0
cursor_shape beam

confirm_os_window_close 0
hide_window_decorations 1
scrollback_lines 10000
enable_audio_bell no
bell_on_tab none

background_opacity 0.5
dynamic_background_opacity yes

# Base16 Black Metal (Burzum)
# Scheme by metalelf0 (https://github.com/metalelf0)
background #000000
foreground #c1c1c1
selection_background #c1c1c1
selection_foreground #000000
url_color #999999
cursor #c1c1c1
active_border_color #333333
inactive_border_color #121212
active_tab_background #000000
active_tab_foreground #c1c1c1
inactive_tab_background #121212
inactive_tab_foreground #999999
tab_bar_background #121212

color0 #000000
# color1 #5f8787
# color2 #ddeecc
# color3 #99bbaa
color4 #888888
color5 #999999
color6 #aaaaaa
color7 #c1c1c1
color8 #333333
# color9 #5f8787
# color10 #ddeecc
# color11 #99bbaa
color12 #888888
color13 #999999
color14 #aaaaaa
color15 #c1c1c1
color16 #aaaaaa
color17 #444444
color18 #121212
color19 #222222
color20 #999999
color21 #999999

# ------------------------------------------------------------------------------
# tmux-ish prefix on Ctrl+S
# Put: stty -ixon
# in ~/.zshrc or ~/.bashrc, otherwise Ctrl+S may still trigger XON/XOFF.
# ------------------------------------------------------------------------------

# Layouts
map ctrl+a>space next_layout
map ctrl+a>z toggle_layout stack
map ctrl+a>alt+1 goto_layout horizontal
map ctrl+a>alt+2 goto_layout vertical
map ctrl+a>alt+3 goto_layout fat
map ctrl+a>alt+4 goto_layout tall
map ctrl+a>alt+5 goto_layout grid
map ctrl+a>alt+6 goto_layout fat:mirrored=true
map ctrl+a>alt+7 goto_layout tall:mirrored=true
map ctrl+a>= reset_window_sizes

# Tabs (tmux "windows")
map ctrl+a>c new_tab_with_cwd
map ctrl+a>n next_tab
map ctrl+a>p previous_tab
map ctrl+a>w select_tab
map ctrl+a>, set_tab_title " "
map ctrl+a>shift+w close_tab
map ctrl+a>1 goto_tab 1
map ctrl+a>2 goto_tab 2
map ctrl+a>3 goto_tab 3
map ctrl+a>4 goto_tab 4
map ctrl+a>5 goto_tab 5
map ctrl+a>6 goto_tab 6
map ctrl+a>7 goto_tab 7
map ctrl+a>8 goto_tab 8
map ctrl+a>9 goto_tab 9
map ctrl+a>0 goto_tab 10

# Panes (kitty windows inside a tab)
map ctrl+a>enter new_window_with_cwd
map ctrl+a>' launch --location=vsplit --cwd=current
map ctrl+a>% launch --location=hsplit --cwd=current

map ctrl+a>h neighboring_window left
map ctrl+a>j neighboring_window bottom
map ctrl+a>k neighboring_window top
map ctrl+a>l neighboring_window right
map ctrl+a>left neighboring_window left
map ctrl+a>down neighboring_window bottom
map ctrl+a>up neighboring_window top
map ctrl+a>right neighboring_window right

map ctrl+a>o next_window
map ctrl+a>; nth_window -1
map ctrl+a>q focus_visible_window
map ctrl+a>x close_window
map ctrl+a>. set_window_title " "

# Move panes
map ctrl+a>shift+h move_window left
map ctrl+a>shift+j move_window bottom
map ctrl+a>shift+k move_window top
map ctrl+a>shift+l move_window right

# Resize panes
map ctrl+a>ctrl+left resize_window narrower
map ctrl+a>ctrl+right resize_window wider
map ctrl+a>trl+up resize_window taller
map ctrl+a>ctrl+down resize_window shorter

map ctrl+a>alt+left resize_window narrower 5
map ctrl+a>alt+right resize_window wider 5
map ctrl+a>alt+up resize_window taller 5
map ctrl+a>alt+down resize_window shorter 5

# Sessions
map ctrl+a>/ goto_session ~/.local/share/kitty/sessions
map ctrl+a>shift+s save_as_session --use-foreground-process --base-dir ~/.local/share/kitty/sessions
map ctrl+a>a save_as_session --relocatable --use-foreground-process --match=session:. .
map ctrl+a>d detach_tab
map ctrl+a>shift+d detach_window
map ctrl+a>shift+q close_session .

# Scrollback / copy-ish workflow
map ctrl+a>[ show_scrollback
map ctrl+a>] paste_from_clipboard
map ctrl+a>f search_scrollback
map ctrl+a>g show_last_command_output

# Kitty controls
map ctrl+a>shift+c edit_config_file
map ctrl+a>r load_config_file
map ctrl+a>shift+p command_palette
map ctrl+a>: kitty_shell
map ctrl+a>? show_kitty_doc conf
